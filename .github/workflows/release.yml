name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        default: 1.1.0
      build_number:
        description: App build number
        required: true
        default: "2"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build DMG
        env:
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: ./scripts/create_dmg.sh

      - name: Create release notes
        env:
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          DMG_PATH="dist/SprintFocusTimer-${VERSION}.dmg"
          CHECKSUM="$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')"

          cat > release-notes.md <<EOF
          SprintFocusTimer ${VERSION} for macOS

          Download SprintFocusTimer-${VERSION}.dmg, open it, and drag SprintFocusTimer.app into Applications.

          This build is unsigned and unnotarized. If macOS blocks it on first launch, right-click the app and choose Open. The source code is public in this repository for review.

          Highlights:
          - Slide-out focus board with saved rich text reminders
          - Resizable drawer and persistent window placement
          - Preset timers from 1 to 90 minutes
          - Milestone markers, milestone sounds, completion alarm, and visual attention glow
          - Light/dark mode and always-on-top options

          Version: ${VERSION}
          Build: ${BUILD_NUMBER}
          SHA-256: ${CHECKSUM}
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"
          DMG_PATH="dist/SprintFocusTimer-${VERSION}.dmg"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
            gh release edit "$TAG" --title "SprintFocusTimer ${VERSION}" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" "$DMG_PATH" --title "SprintFocusTimer ${VERSION}" --notes-file release-notes.md --latest
          fi
